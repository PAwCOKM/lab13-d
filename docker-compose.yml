services:

  nginx:
    image: nginx:1.27
    container_name: nginx
    ports:
      - "4001:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - frontend
      - backend

  php:
    image: php:8.3-fpm
    container_name: php
    volumes:
      - ./www:/var/www/html
    networks:
      - backend

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: testdb

    secrets:
      - db_root_password

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin
    restart: always

    ports:
      - "6001:80"

    environment:
      PMA_HOST: mysql

    depends_on:
      - mysql

    networks:
      - frontend
      - backend

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt

volumes:
  mysql_data:

networks:
  frontend:
  backend: